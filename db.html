<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ربط قاعدة البيانات - نظام آمن</title>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 5px;
            display: none;
            animation: slideIn 0.3s ease-in-out;
        }

        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
        }

        .tab-btn {
            padding: 10px 20px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-weight: 600;
            color: #999;
            transition: color 0.3s, border-color 0.3s;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .data-table th,
        .data-table td {
            padding: 10px;
            text-align: right;
            border: 1px solid #ddd;
        }

        .data-table th {
            background-color: #f5f5f5;
            font-weight: 600;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .logout-btn {
            background-color: #dc3545;
            margin-top: 20px;
            display: none;
        }

        .logout-btn:hover {
            box-shadow: 0 5px 20px rgba(220, 53, 69, 0.4);
        }

        .user-info {
            text-align: center;
            padding: 10px;
            background-color: #f0f0f0;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .g-recaptcha {
            margin: 20px 0;
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 نظام الربط الآمن</h1>

        <div class="user-info" id="userInfo"></div>

        <!-- التبويبات -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('login')">تسجيل الدخول</button>
            <button class="tab-btn" onclick="switchTab('data')">البيانات</button>
        </div>

        <!-- تبويب تسجيل الدخول -->
        <div id="login" class="tab-content active">
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">البريد الإلكتروني</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="password">كلمة المرور</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <!-- reCAPTCHA -->
                <div class="g-recaptcha" data-sitekey="YOUR_RECAPTCHA_SITE_KEY"></div>

                <button type="submit">دخول آمن</button>
                <button type="button" onclick="handleLogout()" class="logout-btn" id="logoutBtn">تسجيل الخروج</button>
            </form>
            <div class="message" id="loginMessage"></div>
        </div>

        <!-- تبويب البيانات -->
        <div id="data" class="tab-content">
            <div class="form-group">
                <label for="tableSelect">اختر الجدول</label>
                <select id="tableSelect">
                    <option value="">اختر جدول...</option>
                    <option value="users">المستخدمين</option>
                    <option value="posts">المنشورات</option>
                    <option value="comments">التعليقات</option>
                </select>
            </div>

            <button type="button" onclick="loadTableData()">تحميل البيانات</button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>جاري التحميل...</p>
            </div>

            <div id="dataContainer"></div>
            <div class="message" id="dataMessage"></div>
        </div>
    </div>

    <script>
        // ============================================
        // متغيرات عامة
        // ============================================
        const API_URL = '/api.php'; // عدل هذا إلى نطاقك
        let csrfToken = '';
        let isLoggedIn = false;

        // ============================================
        // تهيئة البرنامج
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            getCsrfToken();
            checkLoginStatus();
        });

        // ============================================
        // الحصول على CSRF Token
        // ============================================
        async function getCsrfToken() {
            try {
                const response = await fetch(API_URL + '?action=csrf_token', {
                    method: 'GET',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();
                if (data.success) {
                    csrfToken = data.csrf_token;
                }
            } catch (error) {
                console.error('خطأ في الحصول على CSRF Token:', error);
            }
        }

        // ============================================
        // التحقق من حالة تسجيل الدخول
        // ============================================
        function checkLoginStatus() {
            // يمكن استخدام cookie أو session للتحقق
            const loginForm = document.getElementById('loginForm');
            const logoutBtn = document.getElementById('logoutBtn');
            
            // إذا كان لديك طريقة للتحقق من الجلسة، استخدمها هنا
            // مثلاً: send a request to check if user is logged in
        }

        // ============================================
        // تسجيل الدخول
        // ============================================
        async function handleLogin(event) {
            event.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('loginMessage');

            // الحصول على رمز reCAPTCHA
            const recaptchaResponse = grecaptcha.getResponse();
            if (!recaptchaResponse) {
                showMessage(messageDiv, 'يجب التحقق من أنك لست روبوتاً', 'error');
                return;
            }

            // التحقق من البيانات على الجانب الآمن
            if (!validateEmail(email)) {
                showMessage(messageDiv, 'صيغة البريد غير صحيحة', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage(messageDiv, 'كلمة المرور يجب أن تكون 6 أحرف على الأقل', 'error');
                return;
            }

            try {
                const formData = new FormData();
                formData.append('action', 'login');
                formData.append('email', email);
                formData.append('password', password);
                formData.append('recaptcha_token', recaptchaResponse);
                formData.append('csrf_token', csrfToken);

                const response = await fetch(API_URL, {
                    method: 'POST',
                    credentials: 'include',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    showMessage(messageDiv, data.message, 'success');
                    isLoggedIn = true;
                    updateUIAfterLogin(email);
                    document.getElementById('loginForm').reset();
                    grecaptcha.reset();
                } else {
                    showMessage(messageDiv, data.message, 'error');
                }
            } catch (error) {
                showMessage(messageDiv, 'خطأ في الاتصال: ' + error.message, 'error');
                console.error('خطأ:', error);
            }
        }

        // ============================================
        // تسجيل الخروج
        // ============================================
        async function handleLogout() {
            try {
                const formData = new FormData();
                formData.append('action', 'logout');
                formData.append('csrf_token', csrfToken);

                const response = await fetch(API_URL, {
                    method: 'POST',
                    credentials: 'include',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    isLoggedIn = false;
                    document.getElementById('userInfo').style.display = 'none';
                    document.getElementById('logoutBtn').style.display = 'none';
                    switchTab('login');
                }
            } catch (error) {
                console.error('خطأ:', error);
            }
        }

        // ============================================
        // تحميل بيانات الجدول
        // ============================================
        async function loadTableData() {
            const tableSelect = document.getElementById('tableSelect').value;
            const dataContainer = document.getElementById('dataContainer');
            const messageDiv = document.getElementById('dataMessage');
            const loading = document.getElementById('loading');

            if (!isLoggedIn) {
                showMessage(messageDiv, 'يجب تسجيل الدخول أولاً', 'error');
                return;
            }

            if (!tableSelect) {
                showMessage(messageDiv, 'اختر جدولاً', 'error');
                return;
            }

            loading.style.display = 'block';
            dataContainer.innerHTML = '';

            try {
                const response = await fetch(
                    API_URL + '?action=get_data&table=' + encodeURIComponent(tableSelect),
                    {
                        method: 'GET',
                        credentials: 'include',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRF-Token': csrfToken
                        }
                    }
                );

                const data = await response.json();
                loading.style.display = 'none';

                if (data.success) {
                    renderTable(data.data, dataContainer);
                    showMessage(messageDiv, 'تم تحميل البيانات بنجاح', 'success');
                } else {
                    showMessage(messageDiv, data.message, 'error');
                }
            } catch (error) {
                loading.style.display = 'none';
                showMessage(messageDiv, 'خطأ في الاتصال: ' + error.message, 'error');
                console.error('خطأ:', error);
            }
        }

        // ============================================
        // عرض الجدول
        // ============================================
        function renderTable(data, container) {
            if (data.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #999;">لا توجد بيانات</p>';
                return;
            }

            const keys = Object.keys(data[0]);
            let table = '<table class="data-table"><thead><tr>';

            keys.forEach(key => {
                table += '<th>' + escapeHtml(key) + '</th>';
            });
            table += '</tr></thead><tbody>';

            data.forEach(row => {
                table += '<tr>';
                keys.forEach(key => {
                    table += '<td>' + escapeHtml(String(row[key])) + '</td>';
                });
                table += '</tr>';
            });

            table += '</tbody></table>';
            container.innerHTML = table;
        }

        // ============================================
        // دوال مساعدة
        // ============================================
        function switchTab(tabName) {
            // إخفاء جميع التبويبات
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });

            // إزالة الفئة النشطة من جميع الأزرار
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // عرض التبويب المختار
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');

            // التحقق من تسجيل الدخول عند التبديل إلى تبويب البيانات
            if (tabName === 'data' && !isLoggedIn) {
                showMessage(document.getElementById('dataMessage'), 'يجب تسجيل الدخول أولاً', 'error');
                switchTab('login');
            }
        }

        function showMessage(element, message, type) {
            element.textContent = message;
            element.className = 'message ' + type;
            setTimeout(() => {
                if (type === 'success') {
                    element.classList.remove(type);
                }
            }, 5000);
        }

        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function updateUIAfterLogin(email) {
            const userInfo = document.getElementById('userInfo');
            userInfo.innerHTML = '👤 أهلاً ' + escapeHtml(email);
            userInfo.style.display = 'block';
            document.getElementById('logoutBtn').style.display = 'block';
        }

        // منع إرسال النموذج بدون CSRF Token
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            if (!csrfToken) {
                e.preventDefault();
                alert('خطأ في الأمان. حاول مرة أخرى');
            }
        });
    </script>
</body>
</html>
